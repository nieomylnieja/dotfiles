#:schema https://developers.openai.com/codex/config-schema.json
model = "gpt-5.5"
model_reasoning_effort = "medium"
personality = "pragmatic"
approvals_reviewer = "guardian_subagent"
model_auto_compact_token_limit = 90000
plan_mode_reasoning_effort = "medium"
model_reasoning_summary = "none"
model_verbosity = "low"
web_search = "cached"
suppress_unstable_features_warning = true

[features]
hooks = true
terminal_resize_reflow = true
guardian_approval = true
mentions_v2 = true

[tools.web_search]
context_size = "low"

# [hooks]
# [[hooks.PostToolUse]]
# matcher = "*"
# [[hooks.PostToolUse.hooks]]
# type = "command"
# command = "$HOME/.dotfiles/config/codex/scripts/compact-tool-result.sh"
# timeout = 90
# statusMessage = "Compacting large tool result"

[agents]
max_depth = 1
max_threads = 3

[agents.quick-inspector]
description = "Use for independent read-only repo inspection when the parent would otherwise need large command output. Do not use for one-command facts such as workspace cleanliness. Return only final facts, exact paths, counts, and blocking errors."
config_file = "/home/mh/.dotfiles/config/codex/agents/quick-inspector.toml"
nickname_candidates = ["Scout", "Probe"]

[mcp_servers]
[mcp_servers.Context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]
[mcp_servers.deepwiki]
url = "https://mcp.deepwiki.com/mcp"
[mcp_servers.exa]
url = "https://mcp.exa.ai/mcp"
[mcp_servers.grep-mcp]
command = "uvx"
args = ["grep-mcp"]
[mcp_servers.pg-aiguide]
url = "https://mcp.tigerdata.com/docs"
[mcp_servers.sequential-thinking]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]
[mcp_servers.serena]
command = "serena"
args = ["start-mcp-server", "--project-from-cwd", "--context=codex"]
startup_timeout_sec = 15

[tui]
theme = "nord"
vim_mode_default = true
